<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1c1c1c; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { background: #2a2a2a; padding: 30px; border-radius: 20px; text-align: center; width: 80%; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Подтвердите личность</h3>
        <p>Нажмите на галочку ниже</p>
        <!-- СЮДА МЫ ВСТАВИМ SITE KEY ПОЗЖЕ -->
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAADJhbtsA524rOG3U" data-callback="onSuccess"></div>
    </div>
    <script>
        function onSuccess(token) {
            Telegram.WebApp.sendData(JSON.stringify({token: token}));
            Telegram.WebApp.close();
        }
    </script>
</body>
</html>
